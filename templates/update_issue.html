<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Update Issue</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

</head>


<body>


    <nav class="navbar navbar-dark">

        <div class="container">

            <a class="navbar-brand" href="/">

                <img src="{{ url_for('static', filename='images/firefox-logo.png') }}" width="45">

                Mozilla Firefox Issue Tracker

            </a>

        </div>

    </nav>



    <div class="container mt-5">


        <div class="card shadow p-4">


            <h2 class="text-center mb-4">

                ✏️ Update Firefox Issue

            </h2>



            <form method="POST" action="/update-issue/{{ issue[0] }}">



                <div class="mb-3">

                    <label class="form-label">

                        Issue Title

                    </label>


                    <input type="text" class="form-control" name="title" value="{{ issue[1] }}" required>

                </div>



                <div class="mb-3">

                    <label>

                        Description

                    </label>


                    <textarea class="form-control" rows="4" name="description" required>{{ issue[2] }}</textarea>


                </div>



                <div class="row">


                    <div class="col-md-6">


                        <label>

                            Severity

                        </label>


                        <select class="form-select" name="severity">


                            <option {% if issue[3]=="Low" %}selected{% endif %}>

                                Low

                            </option>


                            <option {% if issue[3]=="Medium" %}selected{% endif %}>

                                Medium

                            </option>


                            <option {% if issue[3]=="High" %}selected{% endif %}>

                                High

                            </option>


                            <option {% if issue[3]=="Critical" %}selected{% endif %}>

                                Critical

                            </option>


                        </select>


                    </div>



                    <div class="col-md-6">


                        <label>

                            Status

                        </label>


                        <select class="form-select" name="status">


                            <option {% if issue[4]=="Open" %}selected{% endif %}>

                                Open

                            </option>


                            <option {% if issue[4]=="In Progress" %}selected{% endif %}>

                                In Progress

                            </option>


                            <option {% if issue[4]=="Resolved" %}selected{% endif %}>

                                Resolved

                            </option>


                            <option {% if issue[4]=="Closed" %}selected{% endif %}>

                                Closed

                            </option>


                        </select>


                    </div>


                </div>



                <br>



                <div class="row">


                    <div class="col-md-6">


                        <label>

                            Assigned To

                        </label>


                        <input type="text" class="form-control" name="assigned_to" value="{{ issue[6] }}">


                    </div>



                    <div class="col-md-6">


                        <label>

                            Firefox Version

                        </label>


                        <input type="text" class="form-control" name="firefox_version" value="{{ issue[7] }}">


                    </div>


                </div>



                <br>



                <div class="text-center">


                    <button class="btn btn-warning btn-lg">

                        💾 Update Issue

                    </button>


                    <a href="/read-issue" class="btn btn-dark btn-lg">

                        ⬅ Back

                    </a>


                </div>



            </form>


        </div>


    </div>


</body>

</html>
