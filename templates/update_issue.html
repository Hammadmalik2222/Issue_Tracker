<!DOCTYPE html>
<html>

<head>
    <title>Update Issue</title>
</head>

<body>

    <h1>Update Issue</h1>


    <form method="POST" action="/update-issue/{{ issue[0] }}">


        <label>Title:</label>
        <input type="text" name="title" value="{{ issue[1] }}">


        <br><br>


        <label>Description:</label>
        <textarea name="description">{{ issue[2] }}</textarea>


        <br><br>


        <label>Severity:</label>

        <select name="severity">

            <option>{{ issue[3] }}</option>
            <option>Low</option>
            <option>Medium</option>
            <option>High</option>
            <option>Critical</option>

        </select>


        <br><br>


        <label>Status:</label>

        <select name="status">

            <option>{{ issue[4] }}</option>
            <option>Open</option>
            <option>In Progress</option>
            <option>Resolved</option>
            <option>Closed</option>

        </select>


        <br><br>


        <label>Assigned To:</label>

        <input type="text" name="assigned_to" value="{{ issue[6] }}">


        <br><br>


        <button type="submit">
            Update Issue
        </button>


    </form>


</body>

</html>
