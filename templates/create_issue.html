<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Add New Issue</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>

    <nav class="navbar navbar-dark">

        <div class="container">

            <a class="navbar-brand" href="/">

                <img src="{{ url_for('static', filename='images/firefox-logo.png') }}" width="45">

                Mozilla Firefox Issue Tracker

            </a>

        </div>

    </nav>


    <div class="container mt-5">

        <div class="card shadow p-4">

            <h2 class="text-center mb-4">

                🦊 Add New Firefox Issue

            </h2>


            <form method="POST" action="/create-issue">


                <div class="mb-3">

                    <label class="form-label">

                        Issue Title

                    </label>

                    <input type="text" class="form-control" name="title" required>

                </div>



                <div class="mb-3">

                    <label>

                        Description

                    </label>

                    <textarea class="form-control" rows="4" name="description" required>

</textarea>

                </div>



                <div class="row">

                    <div class="col-md-6">

                        <label>

                            Severity

                        </label>

                        <select class="form-select" name="severity">

                            <option>Low</option>

                            <option>Medium</option>

                            <option>High</option>

                            <option>Critical</option>

                        </select>

                    </div>


                    <div class="col-md-6">

                        <label>

                            Reported By

                        </label>

                        <input type="text" class="form-control" name="reported_by">

                    </div>

                </div>


                <br>


                <div class="row">

                    <div class="col-md-6">

                        <label>

                            Assigned To

                        </label>

                        <input type="text" class="form-control" name="assigned_to">

                    </div>


                    <div class="col-md-6">

                        <label>

                            Firefox Version

                        </label>

                        <input type="text" class="form-control" name="firefox_version">

                    </div>

                </div>


                <br>


                <div class="mb-3">

                    <label>

                        Security Issue

                    </label>

                    <select class="form-select" name="is_security_issue">

                        <option>Yes</option>

                        <option>No</option>

                    </select>

                </div>


                <div class="text-center">

                    <button class="btn btn-warning btn-lg">

                        ➕ Add Issue

                    </button>

                    <a href="/" class="btn btn-dark btn-lg">

                        🏠 Home

                    </a>

                </div>


            </form>

        </div>

    </div>

</body>

</html>
